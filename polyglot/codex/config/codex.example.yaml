# CODEX Configuration Example
# Copy this to codex.yaml and customize for your project

project:
  name: "My Research Codex"
  version: "1.0.0"
  description: "Unified knowledge corpus"
  base_path: "."

extraction:
  source_paths:
    - "00_source/library"
    - "00_source/conversations"
    - "00_source/research"
  
  include_patterns:
    - "**/*.md"
    - "**/*.txt"
    - "**/*.png"
    - "**/*.jpg"
  
  exclude_patterns:
    - "**/.git/**"
    - "**/node_modules/**"
  
  image_processing:
    enabled: true
    ocr_enabled: true
    multimodal_api: "anthropic"
    api_key_env: "ANTHROPIC_API_KEY"
    batch_size: 10

chunking:
  strategy: hierarchical
  paragraph_target_tokens: 250
  section_target_tokens: 1000
  document_target_tokens: 4000
  overlap_tokens: 50

embedding:
  provider: anthropic
  api_key_env: "ANTHROPIC_API_KEY"
  dimensions: 3072
  batch_size: 100
  rate_limit_rps: 10.0

indexing:
  graph_enabled: true
  vector_index_enabled: true
  connection_threshold: 0.85

export:
  formats: [jsonl, json]
  
  vaya_vida:
    enabled: true
    sphere_version: "v5.1.0"
    max_nodes: 200
    coordinate_algorithm: fibonacci

pipeline:
  workers: 8
  rayon_threads: 4

dev:
  log_level: info
  progress_bars: true
