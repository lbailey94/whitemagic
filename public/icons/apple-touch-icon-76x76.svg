<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 76 76" width="76" height="76">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.52"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="76" height="76" rx="11.4" fill="url(#bg)"/>

  <!-- Orbit rings -->
  <ellipse cx="38.0" cy="38.0" rx="15.959999999999997" ry="7.979999999999999"
           fill="none" stroke="#06b6d4" stroke-width="0.608"
           opacity="0.4" transform="rotate(0 38.0 38.0)"/>
  <ellipse cx="38.0" cy="38.0" rx="22.609999999999996" ry="11.969999999999997"
           fill="none" stroke="#7c3aed" stroke-width="0.456"
           opacity="0.3" transform="rotate(30 38.0 38.0)"/>
  <ellipse cx="38.0" cy="38.0" rx="29.26" ry="15.959999999999997"
           fill="none" stroke="#67e8f9" stroke-width="0.304"
           opacity="0.2" transform="rotate(60 38.0 38.0)"/>

  <!-- Star glow -->
  <circle cx="38.0" cy="38.0" r="31.919999999999995" fill="url(#glow)"/>

  <!-- 5-pointed star (holographic symbol) -->
  <polygon points="48.6,64.6 47.1,43.7 48.6,64.6 47.1,43.7 48.6,64.6 47.1,43.7 48.6,64.6 47.1,43.7 48.6,64.6 47.1,43.7"
           fill="#7c3aed" opacity="0.9"/>

  <!-- Core glow -->
  <circle cx="38.0" cy="38.0" r="13.68" fill="url(#coreGlow)"/>

  <!-- Core dot -->
  <circle cx="38.0" cy="38.0" r="4.56" fill="#f59e0b"/>

  <!-- Accent dots (representing 5D coordinates) -->
  <circle cx="24.700000000000003" cy="30.020000000000003"
          r="1.52" fill="#06b6d4" opacity="0.7"/>
  <circle cx="48.64" cy="24.700000000000003"
          r="1.14" fill="#67e8f9" opacity="0.6"/>
  <circle cx="53.959999999999994" cy="43.32"
          r="1.3679999999999999" fill="#a78bfa" opacity="0.5"/>
</svg>