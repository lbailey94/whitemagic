<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="60" height="60" rx="9.0" fill="url(#bg)"/>

  <!-- Orbit rings -->
  <ellipse cx="30.0" cy="30.0" rx="12.6" ry="6.3"
           fill="none" stroke="#06b6d4" stroke-width="0.48"
           opacity="0.4" transform="rotate(0 30.0 30.0)"/>
  <ellipse cx="30.0" cy="30.0" rx="17.849999999999998" ry="9.45"
           fill="none" stroke="#7c3aed" stroke-width="0.36"
           opacity="0.3" transform="rotate(30 30.0 30.0)"/>
  <ellipse cx="30.0" cy="30.0" rx="23.1" ry="12.6"
           fill="none" stroke="#67e8f9" stroke-width="0.24"
           opacity="0.2" transform="rotate(60 30.0 30.0)"/>

  <!-- Star glow -->
  <circle cx="30.0" cy="30.0" r="25.2" fill="url(#glow)"/>

  <!-- 5-pointed star (holographic symbol) -->
  <polygon points="38.4,51.0 37.2,34.5 38.4,51.0 37.2,34.5 38.4,51.0 37.2,34.5 38.4,51.0 37.2,34.5 38.4,51.0 37.2,34.5"
           fill="#7c3aed" opacity="0.9"/>

  <!-- Core glow -->
  <circle cx="30.0" cy="30.0" r="10.799999999999999" fill="url(#coreGlow)"/>

  <!-- Core dot -->
  <circle cx="30.0" cy="30.0" r="3.5999999999999996" fill="#f59e0b"/>

  <!-- Accent dots (representing 5D coordinates) -->
  <circle cx="19.5" cy="23.7"
          r="1.2" fill="#06b6d4" opacity="0.7"/>
  <circle cx="38.4" cy="19.5"
          r="0.8999999999999999" fill="#67e8f9" opacity="0.6"/>
  <circle cx="42.6" cy="34.2"
          r="1.0799999999999998" fill="#a78bfa" opacity="0.5"/>
</svg>