<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="27.0" fill="url(#bg)"/>

  <!-- Orbit rings -->
  <ellipse cx="90.0" cy="90.0" rx="37.8" ry="18.9"
           fill="none" stroke="#06b6d4" stroke-width="1.44"
           opacity="0.4" transform="rotate(0 90.0 90.0)"/>
  <ellipse cx="90.0" cy="90.0" rx="53.54999999999999" ry="28.349999999999994"
           fill="none" stroke="#7c3aed" stroke-width="1.08"
           opacity="0.3" transform="rotate(30 90.0 90.0)"/>
  <ellipse cx="90.0" cy="90.0" rx="69.3" ry="37.8"
           fill="none" stroke="#67e8f9" stroke-width="0.72"
           opacity="0.2" transform="rotate(60 90.0 90.0)"/>

  <!-- Star glow -->
  <circle cx="90.0" cy="90.0" r="75.6" fill="url(#glow)"/>

  <!-- 5-pointed star (holographic symbol) -->
  <polygon points="115.2,153.0 111.6,103.5 115.2,153.0 111.6,103.5 115.2,153.0 111.6,103.5 115.2,153.0 111.6,103.5 115.2,153.0 111.6,103.5"
           fill="#7c3aed" opacity="0.9"/>

  <!-- Core glow -->
  <circle cx="90.0" cy="90.0" r="32.4" fill="url(#coreGlow)"/>

  <!-- Core dot -->
  <circle cx="90.0" cy="90.0" r="10.799999999999999" fill="#f59e0b"/>

  <!-- Accent dots (representing 5D coordinates) -->
  <circle cx="58.5" cy="71.1"
          r="3.6" fill="#06b6d4" opacity="0.7"/>
  <circle cx="115.2" cy="58.5"
          r="2.6999999999999997" fill="#67e8f9" opacity="0.6"/>
  <circle cx="127.8" cy="102.6"
          r="3.2399999999999998" fill="#a78bfa" opacity="0.5"/>
</svg>