<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 152 152" width="152" height="152">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3.04"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="152" height="152" rx="22.8" fill="url(#bg)"/>

  <!-- Orbit rings -->
  <ellipse cx="76.0" cy="76.0" rx="31.919999999999995" ry="15.959999999999997"
           fill="none" stroke="#06b6d4" stroke-width="1.216"
           opacity="0.4" transform="rotate(0 76.0 76.0)"/>
  <ellipse cx="76.0" cy="76.0" rx="45.21999999999999" ry="23.939999999999994"
           fill="none" stroke="#7c3aed" stroke-width="0.912"
           opacity="0.3" transform="rotate(30 76.0 76.0)"/>
  <ellipse cx="76.0" cy="76.0" rx="58.52" ry="31.919999999999995"
           fill="none" stroke="#67e8f9" stroke-width="0.608"
           opacity="0.2" transform="rotate(60 76.0 76.0)"/>

  <!-- Star glow -->
  <circle cx="76.0" cy="76.0" r="63.83999999999999" fill="url(#glow)"/>

  <!-- 5-pointed star (holographic symbol) -->
  <polygon points="97.3,129.2 94.2,87.4 97.3,129.2 94.2,87.4 97.3,129.2 94.2,87.4 97.3,129.2 94.2,87.4 97.3,129.2 94.2,87.4"
           fill="#7c3aed" opacity="0.9"/>

  <!-- Core glow -->
  <circle cx="76.0" cy="76.0" r="27.36" fill="url(#coreGlow)"/>

  <!-- Core dot -->
  <circle cx="76.0" cy="76.0" r="9.12" fill="#f59e0b"/>

  <!-- Accent dots (representing 5D coordinates) -->
  <circle cx="49.400000000000006" cy="60.040000000000006"
          r="3.04" fill="#06b6d4" opacity="0.7"/>
  <circle cx="97.28" cy="49.400000000000006"
          r="2.28" fill="#67e8f9" opacity="0.6"/>
  <circle cx="107.91999999999999" cy="86.64"
          r="2.7359999999999998" fill="#a78bfa" opacity="0.5"/>
</svg>