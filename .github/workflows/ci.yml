name: CI

on:
  push:
  pull_request:
  workflow_call:
  workflow_dispatch:
    inputs:
      run_network_tests:
        description: "Run live network-marked tests"
        required: false
        default: false
        type: boolean

jobs:
  core:
    name: Core (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./core
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    env:
      WM_SILENT_INIT: "1"
      WM_STATE_ROOT: /tmp/whitemagic_state
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install
        run: uv sync --all-extras --dev

      - name: Omega Test Gauntlet
        run: python scripts/omega_test.py --ci

      - name: Eval Harness
        run: python -m eval.run_eval --now 2026-01-01T00:00:00Z

  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./core
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install
        run: uv sync --all-extras --dev

      - name: Ruff Check (high-signal rules)
        run: ruff check whitemagic/ --select F821,F601,F401 --ignore E501

      # Blind-except check: added in v24.1.0, blocking in v24.1.0.
      # The June 8 sweep eliminated 537 across 145 files; the v24.1.0
      # exception scan re-baseline (Phase 5) suppressed the
      # remaining 1,328 in tool-handler code with `# ruff: noqa:
      # BLE001` markers. New violations would re-introduce the
      # regression. If a legitimate new `except Exception` block is
      # needed, add a `# ruff: noqa: BLE001` on the same line with
      # a comment explaining why.
      - name: Ruff Blind-Except (BLE001)
        run: |
          echo "Checking for blind-except (BLE001) regressions..."
          ruff check whitemagic/ --select BLE001 --ignore E501 --output-format=concise

      # Mypy: strict enforcement for public surface (tools, interfaces)
      - name: Mypy (public surface — strict)
        continue-on-error: true
        run: |
          mypy whitemagic/tools/ whitemagic/interfaces/ \
            --ignore-missing-imports --no-error-summary \
            --disallow-untyped-defs --warn-return-any
        # P8.3: Advisory — mypy is not yet zero-error on public surface.
        # P7.4 baseline: 611 errors ratcheted. This step is advisory until
        # boundary packages reach zero errors.

      # Mypy: advisory for full codebase (non-blocking for legacy code)
      - name: Mypy (full codebase)
        continue-on-error: true
        run: mypy whitemagic/ --ignore-missing-imports --no-error-summary
        # P8.3: Advisory — full codebase mypy is informational only.

      - name: Check for large files
        run: |
          large_files=$(find . -type f -size +10M -not -path './.git/*' -not -path './.venv/*' -not -path './target/*' -not -path './*.db' 2>/dev/null || true)
          if [ -n "$large_files" ]; then
            echo "WARNING: Large files detected (>10MB):"
            echo "$large_files"
          fi

  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./core
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cd whitemagic-rust && cargo clippy -- -D warnings

      - name: Cargo Test
        run: cd whitemagic-rust && cargo test

  security:
    name: Security Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./core
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install
        run: |
          uv sync --all-extras --dev
          uv pip install bandit pip-audit

      # B603: subprocess without shell=False. Removed from skip list per
      # H5 (release readiness). Audit each subprocess call explicitly.
      - name: Bandit (security scanner)
        run: |
          set -eo pipefail
          bandit -r whitemagic/ \
            --exclude whitemagic/_archived \
            -ll -ii --skip B101,B404 2>&1 | tail -50

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit --strict --desc 2>&1 | tail -20

  extras:
    name: Extras (mcp+cli)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./core
    env:
      WM_SILENT_INIT: "1"
      WM_STATE_ROOT: /tmp/whitemagic_state_extras
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install (extras)
        run: uv sync --all-extras --dev

      - name: Doctor Check
        run: wm doctor

      - name: MCP Import Check
        run: python -c "import fastmcp; print('fastmcp ok')"

      - name: CLI JSON Smoke
        run: |
          python -m whitemagic.cli.cli_app --json status > /tmp/wm_status.json
          python -c "import json; json.load(open('/tmp/wm_status.json')); print('cli json ok')"

  optional-api:
    name: Optional API Extras
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./core
    env:
      WM_SILENT_INIT: "1"
      WM_STATE_ROOT: /tmp/whitemagic_state_api
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install (api extras)
        run: uv sync --extra api --dev

      - name: FastAPI-gated tests
        run: |
          set -eo pipefail
          pytest -q -rs \
            tests/unit/test_p0_regressions.py::test_tools_health_route_precedes_dynamic_tool_lookup \
            tests/unit/test_tools_copy_integration.py::TestWebhookTriggers::test_import \
            tests/unit/test_tools_copy_integration.py::TestWebhookTriggers::test_allowed_actions_structure \
            | tee /tmp/pytest_api.out
          python scripts/verification/check_skip_policy.py /tmp/pytest_api.out --profile optional-api

  optional-opt:
    name: Optional Optimizer Extras
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./core
    env:
      WM_SILENT_INIT: "1"
      WM_STATE_ROOT: /tmp/whitemagic_state_opt
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install (opt extras)
        run: uv sync --extra opt --dev

      - name: CVXPY-gated tests
        run: |
          set -eo pipefail
          pytest -q -rs tests/unit/test_handlers_batch3.py::TestSolverHandlers::test_solver_missing_nodes | tee /tmp/pytest_opt.out
          python scripts/verification/check_skip_policy.py /tmp/pytest_opt.out --profile optional-opt

  packaging:
    name: Build & Install Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./core
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build Wheel
        run: uv build

      - name: Install Wheel (Clean)
        run: uv pip install dist/*.whl

      - name: Verify Installation
        run: |
          WM_SILENT_INIT=1 WM_STATE_ROOT=/tmp/wm_pack_test wm --json status
          # Verify core tools are callable
          WM_SILENT_INIT=1 WM_STATE_ROOT=/tmp/wm_pack_test python -c "from whitemagic.tools.unified_api import call_tool; print(call_tool('capabilities')['status'])"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: whitemagic-wheel
          path: core/dist/*.whl
          retention-days: 30

  reproducible-build:
    name: Reproducible Build Verification
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./core
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build 1 (reproducible)
        run: |
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) uv build --wheel
          mkdir -p /tmp/build1
          cp dist/*.whl /tmp/build1/

      - name: Build 2 (same commit)
        run: |
          rm -rf dist/
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) uv build --wheel
          mkdir -p /tmp/build2
          cp dist/*.whl /tmp/build2/

      - name: Compare SHA-256 hashes
        run: |
          echo "=== Build 1 ==="
          sha256sum /tmp/build1/*
          echo "=== Build 2 ==="
          sha256sum /tmp/build2/*
          echo "=== Comparing ==="
          for f in /tmp/build1/*; do
            name=$(basename "$f")
            h1=$(sha256sum "/tmp/build1/$name" | cut -d' ' -f1)
            h2=$(sha256sum "/tmp/build2/$name" | cut -d' ' -f1)
            if [ "$h1" = "$h2" ]; then
              echo "✓ $name: MATCH ($h1)"
            else
              echo "✗ $name: MISMATCH"
              echo "  build1: $h1"
              echo "  build2: $h2"
              exit 1
            fi
          done
          echo "All wheel artifacts are reproducible!"

      - name: Generate BUILD_HASHES.json
        run: |
          python3 -c "
          import hashlib, json, pathlib, datetime, subprocess
          files = sorted(pathlib.Path('dist').glob('*'))
          hashes = {f.name: hashlib.sha256(f.read_bytes()).hexdigest() for f in files}
          epoch = subprocess.check_output(['git', 'log', '-1', '--format=%ct']).decode().strip()
          sha = subprocess.check_output(['git', 'rev-parse', 'HEAD']).decode().strip()
          data = {
              'hashes': hashes,
              'source_date_epoch': epoch,
              'git_sha': sha,
              'built_at': datetime.datetime.now(datetime.timezone.utc).isoformat(),
          }
          pathlib.Path('BUILD_HASHES.json').write_text(json.dumps(data, indent=2) + '\n')
          print(json.dumps(data, indent=2))
          "

      - name: Upload BUILD_HASHES.json
        uses: actions/upload-artifact@v4
        with:
          name: build-hashes
          path: core/BUILD_HASHES.json
          retention-days: 90

  network-optin:
    name: Live Network Tests (Opt-in)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_network_tests == true }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./core
    env:
      WM_SILENT_INIT: "1"
      WM_STATE_ROOT: /tmp/whitemagic_state_network
      WM_RUN_NETWORK_TESTS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install (network extras)
        run: uv sync --extra net --dev

      - name: Run network-marked tests
        run: |
          set -eo pipefail
          pytest -q -rs -m network tests/unit/test_web_research.py | tee /tmp/pytest_network.out
          python scripts/verification/check_skip_policy.py /tmp/pytest_network.out --profile optional-network

  version-consistency:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version drift
        run: python core/scripts/check_versions.py

  doc-drift:
    name: Doc Drift Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "core/uv.lock"

      - name: Install package
        run: uv sync --all-extras --dev
        working-directory: core

      - name: Check doc drift
        run: python core/scripts/check_doc_drift.py

  site-facts:
    name: Site Facts Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "core/uv.lock"

      - name: Install core package
        run: uv sync --all-extras --dev
        working-directory: core

      - name: Check site facts freshness
        run: python3 apps/site/scripts/sync_facts.py --check

  stub-audit:
    name: Stub Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for structural stubs
        run: python core/scripts/check_stubs.py

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./core
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install
        run: uv sync --all-extras --dev

      - name: Generate Coverage Report
        # P8.3: Advisory — coverage is informational until P8.4 risk-based thresholds are set.
        run: |
          python -m pytest tests/ --ignore=tests/archive_v14 --ignore=tests/archive_v11 -q --cov=whitemagic --cov-report=term-missing --cov-fail-under=25 || echo 'Coverage below threshold — advisory only'

  strata-review:
    name: STRATA Diff Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    defaults:
      run:
        working-directory: ./core
    env:
      WM_SILENT_INIT: "1"
      WM_STATE_ROOT: /tmp/whitemagic_state_strata
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install
        run: uv sync --all-extras --dev

      - name: Run STRATA diff analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WM_PR_NUMBER: ${{ github.event.pull_request.number }}
          WM_REPO: ${{ github.repository }}
          WM_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          WM_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python -c "
          import os, sys, logging, json
          logging.basicConfig(level=logging.INFO)

          from whitemagic.tools.strata.diff_analyzer import DiffAnalyzer
          from whitemagic.tools.suggestions import SuggestionEngine

          # Get the diff
          import subprocess
          base = os.environ['WM_BASE_SHA']
          head = os.environ['WM_HEAD_SHA']
          diff = subprocess.check_output(
              ['git', 'diff', f'{base}...{head}'],
              cwd='..'
          ).decode()

          if not diff.strip():
              print('No changes to review.')
              sys.exit(0)

          analyzer = DiffAnalyzer()
          files = analyzer.parse_diff(diff)

          all_findings = []
          for f in files:
              findings = analyzer.analyze_file(f)
              all_findings.extend(findings)

          if not all_findings:
              print('No STRATA findings. PR is clean!')
              sys.exit(0)

          # Format findings
          engine = SuggestionEngine()
          suggestions = engine.generate_batch([
              {
                  'file': f['file'],
                  'line': f['line'],
                  'severity': f['severity'],
                  'message': f['message'],
                  'checker': f['checker'],
                  'suggestion': f.get('suggestion'),
              }
              for f in all_findings
          ])

          formatted = engine.format_for_github(suggestions)
          print(formatted)

          # Post review via GitHub API
          import urllib.request
          repo = os.environ['WM_REPO']
          pr_number = int(os.environ['WM_PR_NUMBER'])
          token = os.environ['GITHUB_TOKEN']

          # Build review comments
          comments = []
          critical_count = 0
          for s in suggestions:
              if s.severity == 'critical':
                  critical_count += 1
              body = f'**{s.severity.upper()}**: {s.title}\n\n{s.explanation}'
              if s.suggested_code:
                  body += f'\n\n\`\`\`suggestion\n{s.suggested_code}\n\`\`\`'
              comments.append({
                  'path': s.file,
                  'line': s.line,
                  'body': body,
              })

          review = {
              'event': 'REQUEST_CHANGES' if critical_count > 0 else 'COMMENT',
              'body': f'STRATA found {len(suggestions)} finding(s): {critical_count} critical, {len(suggestions) - critical_count} other.',
              'comments': comments,
          }

          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/pulls/{pr_number}/reviews',
              data=json.dumps(review).encode(),
              headers={
                  'Authorization': f'token {token}',
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
              },
              method='POST',
          )
          resp = urllib.request.urlopen(req)
          print(f'Review posted: {resp.status}')
          "
