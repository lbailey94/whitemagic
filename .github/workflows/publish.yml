name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Publish whitemagic-mcp to PyPI ──────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build whitemagic-mcp package
        working-directory: mcp-package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        working-directory: mcp-package
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          python -m twine upload dist/* --non-interactive

  # ── Build and publish wm-seed binaries ──────────────────────────
  publish-seed-binaries:
    name: Build wm-seed binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: wm-seed-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: wm-seed-linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: wm-seed-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: wm-seed-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross

      - name: Build wm-seed
        working-directory: core/whitemagic-rust
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin wm-seed
            cp target/${{ matrix.target }}/release/wm-seed ${{ matrix.asset_name }}
          else
            cargo build --release --target ${{ matrix.target }} --bin wm-seed
            cp target/${{ matrix.target }}/release/wm-seed ${{ matrix.asset_name }}
          fi

      - name: Strip debug symbols
        run: strip ${{ matrix.asset_name }} || true

      - name: Generate checksum
        run: sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          draft: true
