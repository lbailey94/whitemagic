name: slither

on:
  push:
    branches: [main]
    paths:
      - "**.sol"
      - ".github/workflows/slither.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.sol"
  workflow_dispatch:

concurrency:
  group: slither-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slither:
    name: Slither static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "core/uv.lock"
      - name: Install Slither
        run: uv pip install slither-analyzer solc-select
      - name: Install solc
        run: |
          solc-select install 0.8.20
          solc-select use 0.8.20
      - name: Run Slither on Solidity files
        # P8.3: Advisory — Slither findings are informational. Solidity is
        # not a primary language for WhiteMagic; findings are reviewed manually.
        run: |
          # Find all .sol files and run Slither
          SOL_FILES=$(find . -name "*.sol" -not -path "*/node_modules/*" -not -path "*/.git/*" | head -50)
          if [ -z "$SOL_FILES" ]; then
            echo "No Solidity files found — skipping"
            exit 0
          fi
          echo "Found Solidity files:"
          echo "$SOL_FILES"
          # Run Slither with JSON output
          slither . --json - --exclude-informational --exclude-optimization 2>&1 || echo 'Slither found issues — advisory only'
        continue-on-error: true
      - name: Run STRATA security checkers
        working-directory: core
        run: |
          uv sync --all-extras --dev
          python -c "
          from pathlib import Path
          from whitemagic.tools.strata.checkers import get_checkers
          from whitemagic.tools.strata.file_index import FileIndex
          from whitemagic.tools.strata.models import Finding
          project = Path('.')
          fi = FileIndex(project)
          findings = []
          for checker in get_checkers():
              try:
                  checker(project, fi, findings)
              except Exception as e:
                  print(f'Checker {checker.__name__} failed: {e}')
          print(f'Total findings: {len(findings)}')
          for f in findings:
              if 'sol_' in f.category or 'slither' in f.category:
                  print(f'  [{f.severity.value}] {f.category}: {f.file}:{f.line} — {f.message[:100]}')
          "
        continue-on-error: true
