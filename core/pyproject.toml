[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "whitemagic"
version = "24.0.1"
description = "Cognitive operating system for AI agents — 614 callable tools across 28 Gana meta-tools, 5D holographic memory with 10-galaxy taxonomy, Dharma ethical governance, citta stream for continuous consciousness, emotional steering, self-directed attention, goal graph, session recording, dream cycle, and 7-language polyglot acceleration"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "WhiteMagic Contributors"}
]
keywords = ["memory", "ai", "mcp", "context", "llm", "agents", "tools", "governance", "polyglot"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]

dependencies = [
    "click>=8.1.7",
    "pydantic>=2.0.0,<3.0.0",
    "pyyaml>=6.0.0",
]

[project.urls]
Homepage = "https://whitemagic.dev"
Documentation = "https://github.com/lbailey94/whitemagic/blob/main/docs/QUICKSTART.md"
Repository = "https://github.com/lbailey94/whitemagic"
Changelog = "https://github.com/lbailey94/whitemagic/blob/main/CHANGELOG.md"
Issues = "https://github.com/lbailey94/whitemagic/issues"

[project.optional-dependencies]
# === MODULAR INSTALLATION OPTIONS ===
# WhiteMagic is designed to be modular - install only what you need!
#
# Minimal: pip install whitemagic                    (core tool + memory substrate)
# + MCP: pip install whitemagic[mcp]                 (FastMCP server)
# + CLI: pip install whitemagic[cli]                 (Rich formatting)
# + API: pip install whitemagic[api]                 (FastAPI server stack)
# + Development: pip install whitemagic[dev]         (testing, linting, formatting)
#
# Or combine: pip install whitemagic[offline,terminal,dev]

# Local AI & Semantic Search (privacy-first, offline)
embeddings = [
    "sentence-transformers>=2.2.0",  # ~2.5GB with torch
    "torch>=2.0.0,<3.0.0",            # Deep learning framework
    "scipy>=1.10.0",                  # Enhanced search algorithms
    "faiss-cpu>=1.7.4",               # Fast similarity search
]

# Terminal Tool (safe command execution for AI agents)
terminal = [
    # Terminal tool has no extra dependencies - included in core!
    # This extra exists for documentation purposes
]

# Rich CLI formatting
cli = [
    "rich>=13.0.0",
]

# Interactive TUI extras
tui = [
    "textual>=0.50.0",
]

# MCP support (includes fastembed for lightweight semantic search — 50MB, no torch)
mcp = [
    "fastmcp>=0.4.1",
    "fastembed>=0.2.0",
]

# REST / HTTP API stack (optional)
api = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "python-multipart>=0.0.6",
    "email-validator>=2.0.0",
    "httpx>=0.25.0",
]

# Database stack (optional)
db = [
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
]

# Encryption at rest (optional — SQLCipher for encrypted memory DBs)
encrypt = [
    "sqlcipher3>=0.5.0",
]

# Caching & rate limiting (optional)
cache = [
    "redis>=5.0.1",
]

# Networking / async helpers used by some optional modules
net = [
    "aiohttp>=3.9.0",
    "websockets>=12.0",
    "aiofiles>=23.2.1",
    "requests>=2.31.0",
    "urllib3>=2.0.0,<3.0.0",
    "chardet>=5.0.0",
]

# Cloud client libs (optional)
openai = [
    "openai>=1.3.0",
    "tiktoken>=0.5.0",
]

# Authentication helpers (optional)
auth = [
    "passlib[bcrypt]>=1.7.4",
]

# Cryptographic trust (XRPL anchoring, Ed25519 signing)
trust = [
    "xrpl-py>=3.0.0",
    "PyNaCl>=1.5.0",
]

# Numerical / optimization extras (optional)
numeric = [
    "numpy>=1.24.0",
    "scipy>=1.10.0",
]

# Graph topology (networkx for graph engine)
graph = [
    "networkx>=3.0",
]

# Search acceleration (HNSW approximate nearest neighbor + clustering)
# Note: HDBSCAN is now bundled in scikit-learn 1.3+
search = [
    "whitemagic[numeric]",  # numeric includes scipy which search depends on
    "hnswlib>=0.8.0",
]

# Visualization (UMAP projection, clustering)
viz = [
    "whitemagic[numeric]",  # numeric includes scipy which viz depends on
    "umap-learn>=0.5.0",
    "scikit-learn>=1.3.0",
]

opt = [
    "cvxpy>=1.4.0",
]

# Full Offline Suite (everything local, zero cloud dependencies)
offline = [
    "whitemagic[embeddings]",
]

# Development Tools (testing, linting, formatting)
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "whitemagic[mcp]",  # Include MCP for testing
    "pytest-cov>=4.1.0",
    "pytest-timeout>=2.2.0",
    "pytest-xdist>=3.5.0",  # Parallel test execution
    "flaky>=3.7.0",  # For stress tests that flake under load
    "black>=23.0.0",
    "isort>=5.13.0",
    "mypy>=1.0.0",
    "ruff>=0.1.6",
    "maturin>=1.3.0",  # For building Rust extensions
    "nbconvert>=7.16.6",
    "fastmcp>=0.4.1",
]
# File System Watcher (semantic file monitoring)
watcher = [
    "watchdog>=3.0.0",                # File system events
]

# Vision Processing (image analysis, OCR)
vision = [
    "opencv-python>=4.8.0",           # Image processing
    "pytesseract>=0.3.10",            # OCR engine
    "Pillow>=10.0.0",                 # Image manipulation
]

# Dashboard UI server (optional)
dashboard = [
    "flask>=3.0.0",
    "flask-cors>=4.0.0",
]

# Heavy compute bundle (embeddings + search + graph + viz + numeric)
# Atomic ML stack - used by heavy-tier
heavy = [
    "sentence-transformers>=2.2.0",
    "torch>=2.0.0,<3.0.0",
    "scipy>=1.10.0",
    "faiss-cpu>=1.7.4",
    "numpy>=1.24.0",
    "networkx>=3.0",
    "hnswlib>=0.8.0",
    "umap-learn>=0.5.0",
    "scikit-learn>=1.3.0",
]

# === TIERED INSTALLATION BUNDLES ===
# These compose atomic extras into convenient installation profiles.
# Note: pip doesn't support nested extra composition, so dependencies are listed explicitly.

# Lite: Core MCP + CLI only (minimal dependencies, fast install)
lite = [
    "click>=8.1.7",
    "pydantic>=2.0.0,<3.0.0",
    "pyyaml>=6.0.0",
    "fastmcp>=0.4.1",
    "rich>=13.0.0",
