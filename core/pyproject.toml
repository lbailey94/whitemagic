# --- Archived code: no enforcement -------------------------------------
[[tool.mypy.overrides]]
module = "whitemagic._archived.*"
ignore_errors = true

# --- Optional native / Rust bindings: ignore attr-defined on
# dynamic attribute access (e.g. whitemagic_rs.fast_search may or
# may not exist depending on the Rust build). Applied package-wide
# since the same pattern recurs across many files. The underlying
# type guarantees are still enforced; only the "this attribute may
# not exist on this module" check is suppressed. ---
[[tool.mypy.overrides]]
module = ["whitemagic.*"]
disable_error_code = ["attr-defined", "no-any-return", "annotation-unchecked"]

[tool.ruff]
target-version = "py311"
exclude = [
    "modular",
    "modular/**/*",
    "hnsw_head.py",
    "*.pyi",
    "_archives",
    "_archives/**/*",
    "_archived",
    "_archived/**/*",
    ".venv",
    "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "BLE"]
# BLE = blind-except: catches `except Exception:` and bare `except:`
# blocks without re-raise / log / specific exception class. The June
# 8 exception sweep (see docs/message_board/
# SESSION_REPORT_EXCEPTION_SWEEP_2026-06-08.md) eliminated 537 of
# these across 145 files. The v22.2.2 exception scan re-baseline
# (Phase 5) suppressed the remaining 1,328 in tool-handler code with
# file-level `# ruff: noqa: BLE001` markers. New violations would
# re-introduce the regression; add a per-line noqa with a comment
# if a legitimate new `except Exception` block is needed.
ignore = ["E501"]  # Line too long (handled by formatter)

